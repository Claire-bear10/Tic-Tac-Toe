<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe!</title>
  <style>
    body {
      background-color: #fff0f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Comic Sans MS', cursive, sans-serif;
    }

    h1 {
      color: #6600cc;
      font-size: 48px;
      margin-bottom: 10px;
      text-shadow: 2px 2px #ffb3de;
    }

    #message {
      font-size: 28px;
      color: #cc0077;
      margin-bottom: 20px;
      min-height: 40px;
      font-weight: bold;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 8px;
      background-color: #3366ff;
      border: 8px solid #3366ff;
      border-radius: 16px;
      padding: 8px;
    }

    .cell {
      background-color: #fff0f8;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
      user-select: none;
    }

    .cell:hover {
      background-color: #ffe0f4;
    }

    .cell.x {
      color: #7700cc;
    }

    .cell.o {
      color: #ff69b4;
    }

    .cell.winner {
      background-color: #ffe066;
    }

    #restart-btn {
      margin-top: 30px;
      padding: 14px 36px;
      font-size: 22px;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background-color: #3366ff;
      color: white;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 0 #1a44cc;
      transition: transform 0.1s;
    }

    #restart-btn:hover {
      background-color: #254dc7;
      transform: translateY(2px);
      box-shadow: 0 2px 0 #1a44cc;
    }

    #turn {
      font-size: 22px;
      color: #555;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

  <h1>Tic Tac Toe!</h1>
  <div id="message">Let's play!</div>
  <div id="turn">It's X's turn!</div>

  <div id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <button id="restart-btn">Play Again!</button>

  <script>
    const cells = document.querySelectorAll('.cell');
    const message = document.getElementById('message');
    const turnText = document.getElementById('turn');
    const restartBtn = document.getElementById('restart-btn');

    let board = ['', '', '', '', '', '', '', '', ''];
    let currentPlayer = 'X';
    let gameOver = false;

    const winningCombos = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
      [0, 3, 6], [1, 4, 7], [2, 5, 8], // columns
      [0, 4, 8], [2, 4, 6]             // diagonals
    ];

    function checkWinner() {
      for (const combo of winningCombos) {
        const [a, b, c] = combo;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return combo;
        }
      }
      return null;
    }

    function handleClick(e) {
      const index = e.target.dataset.index;
      if (board[index] || gameOver) return;

      board[index] = currentPlayer;
      e.target.textContent = currentPlayer;
      e.target.classList.add(currentPlayer.toLowerCase());

      const winCombo = checkWinner();
      if (winCombo) {
        winCombo.forEach(i => cells[i].classList.add('winner'));
        message.textContent = currentPlayer === 'X' ? '🎉 X wins! Woohoo!' : '🎉 O wins! Woohoo!';
        turnText.textContent = '';
        gameOver = true;
        return;
      }

      if (board.every(cell => cell !== '')) {
        message.textContent = "It's a tie! Good game!";
        turnText.textContent = '';
        gameOver = true;
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      turnText.textContent = `It's ${currentPlayer}'s turn!`;
    }

    function restart() {
      board = ['', '', '', '', '', '', '', '', ''];
      currentPlayer = 'X';
      gameOver = false;
      message.textContent = "Let's play!";
      turnText.textContent = "It's X's turn!";
      cells.forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
      });
    }

    cells.forEach(cell => cell.addEventListener('click', handleClick));
    restartBtn.addEventListener('click', restart);
  </script>

</body>
</html>
